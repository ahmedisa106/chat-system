<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth-layout.css">
  <link rel="stylesheet" href="../assets/css/auth-forms.css">
</head>
<body>
  <div class="auth-page">
    <aside class="auth-brand">
      <div class="auth-brand__content">
        <i class="bi bi-chat-dots-fill auth-brand__icon"></i>
        <h2 class="auth-brand__title">شات ديزاين</h2>
        <p class="auth-brand__subtitle">تواصل مع أصدقائك وفريقك بسهولة وأمان</p>
        <ul class="auth-brand__features">
          <li><i class="bi bi-chat-heart"></i> <span>محادثات فردية وجماعية</span></li>
          <li><i class="bi bi-shield-check"></i> <span>رسائل مشفّرة التصميم</span></li>
          <li><i class="bi bi-lightning"></i> <span>تجربة سريعة وسلسة</span></li>
        </ul>
      </div>
    </aside>

    <main class="auth-form-panel">
      <div class="auth-form-panel__inner">
        <div class="auth-form-panel__mobile-brand">
          <i class="bi bi-chat-dots-fill"></i>
          <h1>شات ديزاين</h1>
        </div>

        <div class="auth-card">
          <h1 class="auth-form__title">تسجيل الدخول</h1>
          <p class="auth-form__subtitle">أدخل رقم هاتفك وكلمة المرور</p>

          <div id="formAlert" class="auth-form__alert" role="alert">
            <i class="bi bi-info-circle-fill"></i>
            <span class="alert-text"></span>
          </div>

          <!-- Laravel: method="POST" action="{{ route('login') }}" -->
          <form id="loginForm" class="auth-form" method="POST" action="index.html" novalidate>
            <input type="hidden" name="_token" value="">

            <div class="mb-field">
              <label for="phone" class="form-label-custom">رقم الهاتف</label>
              <div class="input-group-custom">
                <i class="bi bi-telephone input-icon"></i>
                <input type="tel" id="phone" name="phone" class="form-control-custom has-icon-start" placeholder="01xxxxxxxxx" dir="ltr" autocomplete="username" required>
              </div>
              <div class="invalid-feedback" id="phone-error"><i class="bi bi-exclamation-circle"></i><span></span></div>
            </div>

            <div class="mb-field">
              <label for="password" class="form-label-custom">كلمة المرور</label>
              <div class="input-group-custom">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" id="password" name="password" class="form-control-custom has-icon-start has-icon-end" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
                <button type="button" class="password-toggle" aria-label="إظهار كلمة المرور"><i class="bi bi-eye"></i></button>
              </div>
              <div class="invalid-feedback" id="password-error"><i class="bi bi-exclamation-circle"></i><span></span></div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary-custom auth-form__submit">
              <span class="btn-text">تسجيل الدخول</span>
              <span class="btn-spinner spinner-border spinner-border-sm" role="status"></span>
            </button>
          </form>

          <div class="auth-form__footer">
            <p class="auth-footer-text">ليس لديك حساب؟ <a href="register.html" class="auth-link">سجّل الآن</a></p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/auth-common.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
