<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>خالد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/conversations.css">
  <link rel="stylesheet" href="../assets/css/chat.css">
  <link rel="stylesheet" href="../assets/css/voice-call.css">
</head>
<body class="page-shell">
  <div class="chat-app chat-app--panel-open">
    <aside class="sidebar-panel">
      <div class="sidebar-top">
        <div class="sidebar-profile">
          <div class="avatar-wrap">
            <div class="avatar avatar--sm" style="background:#075e54">أ</div>
            <span class="status-dot status-dot--online" id="myStatusDot" title="متصل"></span>
          </div>
          <div class="sidebar-profile__info">
            <span class="sidebar-profile__name">أحمد</span>
            <button type="button" class="sidebar-profile__status-btn" id="statusToggle" data-status="online">
              <i class="bi bi-circle-fill status-icon status-icon--online"></i>
              <span class="status-label">متصل</span>
            </button>
          </div>
        </div>
        <div class="sidebar-top__actions">
          <a href="new-chat.html" class="sidebar-top__btn" title="محادثة جديدة"><i class="bi bi-chat-dots-fill"></i></a>
          <a href="create-group.html" class="sidebar-top__btn" title="إنشاء مجموعة"><i class="bi bi-people-fill"></i></a>
          <a href="logout.html" class="sidebar-top__btn sidebar-top__btn--logout" title="تسجيل الخروج"><i class="bi bi-box-arrow-right"></i></a>
        </div>
      </div>
      <div class="search-bar">
        <div class="search-bar__input-wrap">
          <i class="bi bi-search search-bar__icon"></i>
          <input type="text" class="search-bar__input" id="searchInput" placeholder="بحث في المحادثات...">
        </div>
      </div>
      <div class="filter-tabs">
        <button class="filter-tabs__btn active" data-filter="all">الكل</button>
        <button class="filter-tabs__btn" data-filter="dm">فردي</button>
        <button class="filter-tabs__btn" data-filter="group">مجموعات</button>
      </div>
      <ul class="conversation-list" id="conversationList">
        <li><a href="chat-c1.html" class="conversation-item" data-type="dm" data-name="سارة" data-preview="تمام، أشوفك بكرة"><div class="avatar-wrap"><div class="avatar" style="background:#128c7e">س</div><span class="status-dot status-dot--online" title="متصل"></span></div><div class="conversation-item__body"><div class="conversation-item__top"><span class="conversation-item__name">سارة</span><span class="conversation-item__time">10:30</span></div><div class="conversation-item__bottom"><span class="conversation-item__preview conversation-item__preview--unread">تمام، أشوفك بكرة</span><span class="unread-badge">3</span></div></div></a></li>
        <li><a href="chat-c2.html" class="conversation-item" data-type="dm" data-name="محمد" data-preview="عفواً، تحت أمرك"><div class="avatar-wrap"><div class="avatar" style="background:#34b7f1">م</div><span class="status-dot status-dot--offline" title="غير متصل"></span></div><div class="conversation-item__body"><div class="conversation-item__top"><span class="conversation-item__name">محمد</span><span class="conversation-item__time">أمس</span></div><div class="conversation-item__bottom"><span class="conversation-item__preview">عفواً، تحت أمرك</span></div></div></a></li>
        <li><a href="chat-g1.html" class="conversation-item" data-type="group" data-name="فريق التصميم" data-preview="📎 تقرير.pdf"><div class="avatar avatar--group"><i class="bi bi-people-fill"></i></div><div class="conversation-item__body"><div class="conversation-item__top"><span class="conversation-item__name">فريق التصميم <i class="bi bi-people conversation-item__type-icon"></i></span><span class="conversation-item__time">09:15</span></div><div class="conversation-item__bottom"><span class="conversation-item__preview conversation-item__preview--unread">📎 تقرير.pdf</span><span class="unread-badge">7</span></div></div></a></li>
        <li><a href="chat-g2.html" class="conversation-item" data-type="group" data-name="أصدقاء الجامعة" data-preview="😂😂😂"><div class="avatar avatar--group"><i class="bi bi-people-fill"></i></div><div class="conversation-item__body"><div class="conversation-item__top"><span class="conversation-item__name">أصدقاء الجامعة <i class="bi bi-people conversation-item__type-icon"></i></span><span class="conversation-item__time">الجمعة</span></div><div class="conversation-item__bottom"><span class="conversation-item__preview conversation-item__preview--unread">😂😂😂</span><span class="unread-badge">2</span></div></div></a></li>
      </ul>
    </aside>

    <main class="main-panel">
      <header class="page-header">
        <a href="index.html" class="page-header__back page-header__back--mobile-only" title="رجوع"><i class="bi bi-arrow-right"></i></a>
        <div class="chat-header-user">
          <div class="avatar-wrap avatar-wrap--header">
            <div class="avatar avatar--sm" style="background:#e91e63">خ</div>
            <span class="status-dot status-dot--offline" title="غير متصل"></span>
          </div>
          <div>
            <h1 class="page-header__title">خالد</h1>
            <p class="page-header__subtitle page-header__subtitle--offline">غير متصل</p>
          </div>
        </div>
        <div class="page-header__tools">
          <button type="button" class="page-header__tool" id="voiceCallBtn" title="مكالمة صوتية"
            data-contact-name="خالد" data-contact-initial="خ" data-contact-color="#e91e63" data-contact-online="false">
            <i class="bi bi-telephone-fill"></i>
          </button>
        </div>
      </header>
      <div class="chat-page">
        <div class="chat-messages chat-messages--empty" id="chatMessages">
          <p class="chat-empty-hint"><i class="bi bi-chat-text chat-empty-hint__icon"></i>ابدأ المحادثة مع خالد بإرسال أول رسالة</p>
        </div>
        <div class="chat-input-bar">
          <input type="file" class="chat-input-bar__file-input" id="fileInput" accept="*/*">
          <button type="button" class="chat-input-bar__btn" id="attachBtn" title="إرفاق ملف"><i class="bi bi-paperclip"></i></button>
          <div class="chat-input-bar__field-wrap"><textarea class="chat-input-bar__input" id="messageInput" rows="1" placeholder="اكتب رسالة..."></textarea></div>
          <button type="button" class="chat-input-bar__btn" id="emojiBtn" title="إيموجي"><i class="bi bi-emoji-smile"></i></button>
          <button type="button" class="chat-input-bar__btn chat-input-bar__send" id="sendBtn" title="إرسال"><i class="bi bi-send-fill"></i></button>
          <div class="emoji-picker" id="emojiPicker"><div class="emoji-picker__grid" id="emojiGrid"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div class="voice-call" id="voiceCall" aria-hidden="true" data-contact-name="خالد" data-contact-initial="خ" data-contact-color="#e91e63">
    <div class="voice-call__inner">
      <div class="voice-call__avatar avatar" id="callAvatar" style="background:#e91e63">خ</div>
      <h2 class="voice-call__name" id="callName">خالد</h2>
      <p class="voice-call__status" id="callStatus">جاري الاتصال...</p>
      <p class="voice-call__timer" id="callTimer" hidden>00:00</p>
      <div class="voice-call__incoming-actions" id="callIncomingActions" hidden>
        <button type="button" class="voice-call__ctrl voice-call__ctrl--decline" id="callDeclineBtn"><span class="voice-call__ctrl-icon"><i class="bi bi-telephone-x-fill"></i></span><span class="voice-call__ctrl-label">رفض</span></button>
        <button type="button" class="voice-call__ctrl voice-call__ctrl--accept" id="callAcceptBtn"><span class="voice-call__ctrl-icon"><i class="bi bi-telephone-fill"></i></span><span class="voice-call__ctrl-label">رد</span></button>
      </div>
      <div class="voice-call__controls" id="callOutgoingControls">
        <button type="button" class="voice-call__ctrl" id="callMuteBtn" title="كتم الصوت"><span class="voice-call__ctrl-icon"><i class="bi bi-mic-fill"></i></span><span class="voice-call__ctrl-label">كتم</span></button>
        <button type="button" class="voice-call__ctrl voice-call__ctrl--end" id="callEndBtn" title="إنهاء المكالمة"><span class="voice-call__ctrl-icon"><i class="bi bi-telephone-x-fill"></i></span><span class="voice-call__ctrl-label">إنهاء</span></button>
        <button type="button" class="voice-call__ctrl" id="callSpeakerBtn" title="مكبر الصوت"><span class="voice-call__ctrl-icon"><i class="bi bi-volume-up-fill"></i></span><span class="voice-call__ctrl-label">سماعة</span></button>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../assets/js/conversations.js"></script>
  <script src="../assets/js/chat.js"></script>
  <script src="../assets/js/voice-call.js"></script>
</body>
</html>
